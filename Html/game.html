<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
</head>
<body>
    <div id="game_number">0</div>
    <button type="button" onclick="inc()">Press to increase count</button>
    <button type="button" onclick="reset()">Reset</button>

</body>
<script>
    function inc(){
        let data = document.getElementById("game_number").innerText
        Number(data)
        data++
        document.getElementById("game_number").innerText = data
    }

    function reset(){
        let data = document.getElementById("game_number").innerText
        Number(data)
        data = 0
        document.getElementById("game_number").innerText = data
        console.log(data)
    }
    
    
    
</script>
</html>
