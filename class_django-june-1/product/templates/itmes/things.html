<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showroom</title>
    <style>
        /* 1. Global Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-primary: #2d3748;
            --text-muted: #718096;
            --accent-color: #4f46e5; /* Indigo */
            --accent-hover: #4338ca;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 2rem 1rem;
        }

        /* 2. Header Styles */
        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* 3. Product Grid Layout */
        .product-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            /* Creates a responsive grid without media queries */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* 4. Product Card Styles */
        .product-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Placeholder for Product Image */
        .product-image {
            width: 100%;
            height: 200px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-weight: 500;
        }

        .product-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .product-address {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        /* Subtle icon helper for address */
        .product-address::before {
            content: "📍"; 
        }

        .product-meta {
            margin-top: auto; /* Pushes the bottom section down equally */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid #edf2f7;
        }

        .product-phone {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* 5. Action Button */
        .btn-view {
            background-color: var(--accent-color);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .btn-view:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Directory</h1>
        <p>Explore listings, locations, and contact information</p>
    </header>

    <main class="product-container">
        
        <!-- Card 1 -->
        <div class="product-card">
            <div class="product-info">
                <h2 class="product-name">Ram Bahadur</h2>
                <div class="product-address">Kathmandu, Nepal</div>
                <div class="product-meta">
                    <span class="product-phone">📞 9841234567</span>
                    <button class="btn-view">View Detail</button>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
