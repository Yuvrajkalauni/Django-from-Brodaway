<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    
    <style>
        /* Form Container Card */
        .contact-form {
            max-width: 400px; 
            margin: 40px auto; 
            padding: 30px; 
            background-color: #ffffff; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Form Title */
        .form-title {
            margin: 0 0 10px 0; 
            color: #333333; 
            text-align: center; 
            font-size: 24px;
        }

        /* Form Field Group Wrapper */
        .form-group {
            display: flex; 
            flex-direction: column; 
            gap: 6px;
        }

        /* Input Labels */
        .form-label {
            font-weight: 600; 
            font-size: 14px; 
            color: #4a5568;
        }

        /* Input Fields */
        .form-input {
            padding: 10px 14px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        /* Dynamic effect when clicking into fields */
        .form-input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* Submit Button */
        .btn-submit {
            margin-top: 10px;
            padding: 12px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        /* Dynamic effect when hovering over the button */
        .btn-submit:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

    <form method="POST" class="contact-form">
        {% csrf_token %}

        <h2 class="form-title">Contact Information</h2>

        <div class="form-group">
            <label class="form-label">Product Name</label>
            <input type="text" name="P_name" placeholder="John Doe" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">Address</label>
            <input type="text" name="P_address" placeholder="123 Main St" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="number" name="P_phone_number" placeholder="986845****" class="form-input">
        </div>

        <button type="submit" class="btn-submit">Submit</button>

    </form>

</body>
</html>
